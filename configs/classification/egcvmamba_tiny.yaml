seed: 42
output: outputs/imagenet/egcvmamba_tiny
model:
  variant: tiny
  num_classes: 1000
  drop_path_rate: 0.05
data:
  path: /path/to/imagenet
  image_size: 224
train:
  epochs: 300
  warmup_epochs: 20
  batch_size: 512  # per GPU; 2048 global on 4 GPUs
  reference_batch_size: 1024
  workers: 12
  lr: 0.001
  min_lr: 0.000001
  weight_decay: 0.05
  betas: [0.9, 0.999]
  eps: 0.00000001
  label_smoothing: 0.1
  ema: true
  ema_decay: 0.9998
  clip_grad: 5.0
  precision: bf16
  channels_last: true
  cudnn_benchmark: true
  auto_resume: true
augmentation:
  randaugment_ops: 2
  randaugment_magnitude: 9
  color_jitter: 0.4
  random_erasing: 0.25
  mixup: 0.8
  cutmix: 1.0
  mixup_prob: 1.0
  mixup_switch_prob: 0.5
  prefetch_factor: 4
