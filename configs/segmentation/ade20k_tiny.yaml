seed: 42
output: outputs/ade20k/egcvmamba_tiny
model:
  variant: tiny
  num_classes: 150
  drop_path_rate: 0.05
  decoder_channels: 128
data:
  path: /path/to/ADEChallengeData2016
  image_size: 512
train:
  epochs: 160
  warmup_epochs: 5
  batch_size: 16  # per GPU; 64 global on 4 GPUs
  reference_batch_size: 64
  workers: 8
  lr: 0.0006
  min_lr: 0.000001
  backbone_lr_multiplier: 0.1
  weight_decay: 0.01
  betas: [0.9, 0.999]
  clip_grad: 5.0
  precision: bf16
  channels_last: true
  cudnn_benchmark: true
  auto_resume: true
augmentation:
  scale_range: [0.5, 2.0]
